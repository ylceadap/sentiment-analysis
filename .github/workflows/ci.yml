name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  model-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install serving dependencies
        run: python -m pip install -e .

      - name: Verify tracked production release
        run: python scripts/manage_model_release.py verify

  test-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        # RobBERT unit tests exercise tensor losses and truncation, so CI must
        # install the same fine-tuning dependency group that owns those paths.
        run: python -m pip install -e '.[train,finetune,dev]'

      - name: Run tests
        run: pytest -q

      - name: Run Ruff lint
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

  docker:
    needs: model-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build serving image
        run: docker build --tag dutch-sentiment:ci .

      - name: Verify container API
        run: |
          docker run --detach --name dutch-sentiment-ci --publish 8000:8000 dutch-sentiment:ci
          trap 'docker logs dutch-sentiment-ci; docker rm --force dutch-sentiment-ci' EXIT
          healthy=false
          for attempt in {1..30}; do
            if curl --fail --silent --output /dev/null http://127.0.0.1:8000/health; then
              healthy=true
              break
            fi
            sleep 1
          done
          if [[ "$healthy" != "true" ]]; then
            exit 1
          fi
          curl --fail --silent --show-error \
            --request POST http://127.0.0.1:8000/classify \
            --header 'Content-Type: application/json' \
            --data '{"review":"Deze film was verrassend goed, met sterke acteurs.","explain":false}' \
            | python -c 'import json, sys; result = json.load(sys.stdin); release = json.load(open("artifacts/model_release.json")); assert result["label"] in {"Positive", "Average", "Negative"}; assert set(result["probabilities"]) == {"Positive", "Average", "Negative"}; assert abs(sum(result["probabilities"].values()) - 1.0) < 1e-6; assert result["detected_language"] == "dutch"; assert result["model_version"] == release["model_version"]'
