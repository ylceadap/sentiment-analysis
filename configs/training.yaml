data_path: Python_Engineer_Challenge_2.csv
output_dir: artifacts
report_dir: reports
mlflow_tracking_uri: sqlite:///mlflow.db
experiment_name: dutch-movie-sentiment
random_seed: 42
test_size: 0.20
cv_folds: 5
language:
  minimum_dutch_confidence: 0.70
  minimum_margin: 0.20
  short_text_characters: 20
model:
  max_iter: 1500
  word_max_features: 40000
  char_max_features: 50000
  min_df: 2
  max_df: 0.98
ordinal:
  output_dir: artifacts/ordinal
  ridge_alphas: [0.1, 1.0, 10.0]
  severe_costs: [2, 3, 4]
  threshold_values:
    - 1.20
    - 1.30
    - 1.40
    - 1.50
    - 1.60
    - 1.70
    - 1.80
    - 1.90
    - 2.00
    - 2.10
    - 2.20
    - 2.30
    - 2.40
    - 2.50
    - 2.60
    - 2.70
    - 2.80
