data_path: Python_Engineer_Challenge_2.csv
output_dir: artifacts
report_dir: reports
mlflow_tracking_uri: ./mlruns
experiment_name: dutch-movie-sentiment
random_seed: 42
test_size: 0.20
cv_folds: 5
language:
  minimum_dutch_confidence: 0.70
  minimum_margin: 0.20
  short_text_characters: 20
model:
  max_iter: 1500
  word_max_features: 40000
  char_max_features: 50000
  min_df: 2
  max_df: 0.98
api:
  max_review_characters: 8000
  default_model_path: artifacts/model.joblib
  default_metadata_path: artifacts/model_metadata.json
