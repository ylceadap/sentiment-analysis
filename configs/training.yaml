data_path: Python_Engineer_Challenge_2.csv
output_dir: artifacts
report_dir: reports
mlflow_tracking_uri: sqlite:///mlflow.db
experiment_name: dutch-movie-sentiment
random_seed: 42
test_size: 0.20
cv_folds: 5
language:
  minimum_dutch_confidence: 0.70
  minimum_margin: 0.20
  short_text_characters: 20
model:
  max_iter: 1500
  word_max_features: 40000
  char_max_features: 50000
  min_df: 2
  max_df: 0.98
ordinal_logistic:
  output_dir: artifacts/ordinal_logistic
  c_values: [0.5, 1.0, 2.0]
  calibration_folds: 3
  threshold_values: [0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75]
