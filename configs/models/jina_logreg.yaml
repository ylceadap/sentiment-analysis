training_config: configs/training.yaml
cache_dir: .cache/jina_embeddings
huggingface_cache_dir: .cache/huggingface
output_csv: artifacts/jina_embedding_experiment_results.csv
decision_json: artifacts/jina_embedding_experiment_decision.json
report_path: reports/jina_embedding_experiment.md
expected_train_normalized_sha256: aa986ef1d8f35ebf232a015fd0e61d3affb1efbe4a589ec4f8653ae01e8ab7c9
expected_test_normalized_sha256: b76afd73eaeed79bf61903ab8475a08c4565cf523a55e8ae34448d2330e00cbb
normalize_embeddings: true
device: auto
use_fp16_on_cuda: true
batch_size: 4
models:
  - name: jina_v3_classification
    model_id: jinaai/jina-embeddings-v3
    revision: ab036b023d30b4d1138c4c3bfa9f0c445ab455d6
    remote_code_dependency: jinaai/xlm-roberta-flash-implementation
    remote_code_revision: 845308d0fd72a8406a3e378450e1a09522790419
    language_scope: multilingual_including_dutch_and_english
    trust_remote_code: true
    task: classification
    max_sequence_length: 1024
    truncate_dimension: 512
    license: cc-by-nc-4.0
logistic_regression:
  c_values: [0.5, 1.0, 2.0]
  class_weights:
    - name: balanced
      value: balanced
    - name: negative_7
      value: {Positive: 1.0, Average: 1.0, Negative: 7.0}
  negative_thresholds: [argmax, 0.25, 0.30, 0.35, 0.40]
promotion_gates:
  minimum_macro_f1_improvement: 0.015
  minimum_negative_precision: 0.60
  minimum_negative_recall_improvement: 0.08
  maximum_accuracy_drop: 0.01
  maximum_cv_macro_f1_std_increase: 0.01
